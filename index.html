<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">

  <title>BGRemover</title>

  <script src="p5.min.js"></script>
  <script src="jszip.min.js"></script>

  <style>
    body {
  margin: 0;
  font-family: sans-serif;
  background: #f0f0f0;
  text-align: center;
  font-size: 20px;
  padding-bottom: 140px;  /* Platz für die Buttons */
}

#okButton, #zipButton {
  z-index: 10;  /* Buttons über dem Canvas */
}
    

    #fileInput {
      margin: 20px;
      font-size: 20px;
    }

    #okButton, #zipButton {
      position: fixed;
      bottom: 80px;
      padding: 16px 28px;
      font-size: 24px;
      color: white;
      border: none;
      border-radius: 8px;
    }

    #okButton {
      right: 40px;
      background: #0078d7;
    }

    #zipButton {
      right: 180px;
      background: #444;
    }
  </style>
</head>
<body>

  <h1>BGRemover</h1>
  <p>Bilder auswählen<br>
  - Nur gleicher Hintergrund! -<br>
  Hintergrundfarbe wählen<br>
  Wischen ↑↓ für Toleranz<br>
  OK oder ZIP-Download</p>

  <input id="fileInput" type="file" accept="image/*" multiple>

  <script>
    let imgs = [];
    let fileInfos = [];
    let selectedColor = null;
    let tolerance = 20;
    let previewImg = null;
    let startImg;

    document.getElementById('fileInput').addEventListener('change', handleFiles);

    function handleFiles(evt) {
      imgs = [];
      fileInfos = [];

      let files = evt.target.files;

      for (let f of files) {
        let url = URL.createObjectURL(f);
        imgs.push(loadImage(url));
        fileInfos.push(f.name); // Originalname merken
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight-510);

      imageMode(CENTER);

      let okButton = createButton('OK');
      okButton.id('okButton');
      okButton.mousePressed(saveAll);

      let zipButton = createButton('ZIP');
      zipButton.id('zipButton');
      zipButton.mousePressed(saveAsZip);
    }

    function draw() {
      background(220);

      if (imgs.length === 0) {
  let s = fitImageToCanvas(startImg);
  image(startImg, width / 2, height / 2, s.w, s.h);
  return;
}

      let imgToShow = previewImg || imgs[0];
      let s = fitImageToCanvas(imgToShow);

      image(imgToShow, width/2, height/2, s.w, s.h);

      fill(0);
      textSize(28);
      textAlign(CENTER);
      text("Toleranz: " + tolerance, width / 2, 40);
    }

    function preload() {
      startImg = loadImage("remove.jpg");
    }

    function fitImageToCanvas(img) {
      let scale = min(width / img.width, height / img.height);
      let w = img.width * scale;
      let h = img.height * scale;
      return { w, h };
    }

    function mousePressed() {
      if (imgs.length === 0) return;

      let img = imgs[0];
      let s = fitImageToCanvas(img);

      let left = width/2 - s.w/2;
      let top  = height/2 - s.h/2;

      if (mouseX < left || mouseX > left + s.w ||
          mouseY < top  || mouseY > top + s.h) return;

      let x = (mouseX - left) * (img.width / s.w);
      let y = (mouseY - top)  * (img.height / s.h);

      selectedColor = img.get(x, y);
      previewImg = makeTransparent(img, selectedColor, tolerance);
    }

    function touchMoved() {
      tolerance = constrain(tolerance + (pmouseY - mouseY) / 2, 0, 100);
      if (selectedColor && imgs.length > 0) {
        previewImg = makeTransparent(imgs[0], selectedColor, tolerance);
      }
      return false;
    }

    function makeTransparent(img, baseColor, tol) {
      let result = createImage(img.width, img.height);
      img.loadPixels();
      result.loadPixels();

      for (let i = 0; i < img.pixels.length; i += 4) {
        let r = img.pixels[i];
        let g = img.pixels[i + 1];
        let b = img.pixels[i + 2];

        let d = dist(r, g, b, baseColor[0], baseColor[1], baseColor[2]);

        result.pixels[i] = r;
        result.pixels[i + 1] = g;
        result.pixels[i + 2] = b;
        result.pixels[i + 3] = d < tol ? 0 : 255;
      }

      result.updatePixels();
      return result;
    }

    /* -----------------------------
       EINZELBILDER SPEICHERN
       (seriell, Browser blockiert nicht)
    ------------------------------ */
    function saveAll() {
      if (!selectedColor) return;

      let i = 0;

      function saveNext() {
        if (i >= imgs.length) return;

        let out = makeTransparent(imgs[i], selectedColor, tolerance);

        let original = fileInfos[i];
        let dot = original.lastIndexOf(".");
        let base = dot > -1 ? original.substring(0, dot) : original;

        out.save(base + "_transparent.png");

        i++;
        setTimeout(saveNext, 150); // wichtig!
      }

      saveNext();
    }

    /* -----------------------------
       ZIP-DOWNLOAD
    ------------------------------ */
    function saveAsZip() {
      if (!selectedColor) return;

      let zip = new JSZip();
      let folder = zip.folder("transparent_images");

      let pending = imgs.length;

      for (let i = 0; i < imgs.length; i++) {
        let out = makeTransparent(imgs[i], selectedColor, tolerance);

        let original = fileInfos[i];
        let dot = original.lastIndexOf(".");
        let base = dot > -1 ? original.substring(0, dot) : original;

        out.loadPixels();
        let pngData = out.canvas.toDataURL("image/png").split(",")[1];

        folder.file(base + "_transparent.png", pngData, { base64: true });

        pending--;
        if (pending === 0) {
          zip.generateAsync({ type: "blob" }).then(function(content) {
            let a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "transparent_images.zip";
            a.click();
          });
        }
      }
    }

  </script>

</body>
</html>
